name: CI — Build, Test y Release OTA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  bump-version:
    name: "🔢 Incrementar versionCode"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      version_code: ${{ steps.bump.outputs.version_code }}
      version_name: ${{ steps.bump.outputs.version_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Incrementar versionCode y versionName
        id: bump
        run: |
          FILE="app/build.gradle.kts"
          CURRENT=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$FILE" | head -1)
          if [ -z "$CURRENT" ]; then
            echo "::error::No se pudo leer versionCode de $FILE"
            exit 1
          fi
          NEW=$(( CURRENT + 1 ))
          NEW_NAME="1.0.${NEW}"
          sed -i "s/versionCode\s*=\s*${CURRENT}/versionCode = ${NEW}/" "$FILE"
          sed -i "s/versionName\s*=\s*\"[^\"]*\"/versionName = \"${NEW_NAME}\"/" "$FILE"
          echo "version_code=$NEW" >> $GITHUB_OUTPUT
          echo "version_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Commit y push [skip ci]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump versionCode to ${{ steps.bump.outputs.version_code }} [skip ci]"
          git push

  compile:
    name: "🔨 Compilar Kotlin"
    runs-on: ubuntu-latest
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generar gradle-wrapper.jar si falta
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar no encontrado — regenerando con 'gradle wrapper'"
            gradle wrapper --gradle-version 8.9
          fi

      - name: Permisos gradlew
        run: chmod +x ./gradlew

      - name: Compilar
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee /tmp/compile.log

      - name: Verificar API keys hardcodeadas
        if: success()
        run: |
          if grep -r --include="*.kt" \
            -E "AIza[A-Za-z0-9_-]{35}|sk-[A-Za-z0-9]{20,}|gsk_[A-Za-z0-9]{20,}" \
            app/src/main/; then
            echo "::error::⛔ API key en texto plano detectada"
            exit 1
          fi

      - name: Resumen errores
        if: failure()
        run: |
          echo "### ❌ Errores de compilación" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^e: |error:" /tmp/compile.log | head -60 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  unit-tests:
    name: "🧪 Tests Unitarios"
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generar gradle-wrapper.jar si falta
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.9
          fi

      - name: Permisos gradlew
        run: chmod +x ./gradlew

      - name: Tests JVM
        run: ./gradlew testDebugUnitTest --no-daemon --continue

      - name: Subir reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: warn

  build-apk:
    name: "📦 Build APK Debug"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generar gradle-wrapper.jar si falta
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.9
          fi

      - name: Permisos gradlew
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-for-release
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Backup APK 14d
        uses: actions/upload-artifact@v4
        with:
          name: "fenix-ia-debug-${{ github.sha }}"
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release-r2:
    name: "☁️ Publicar en Cloudflare R2"
    runs-on: ubuntu-latest
    needs: [bump-version, build-apk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Leer versión
        id: version
        run: |
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Descargar APK
        uses: actions/download-artifact@v4
        with:
          name: apk-for-release
          path: ./apk-output/

      - name: Renombrar APK
        run: mv ./apk-output/app-debug.apk ./apk-output/fenix-ia-latest.apk

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar wrangler
        run: npm install -g wrangler@latest

      - name: Subir APK a R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
        run: |
          wrangler r2 object put "fenix-ia-releases/fenix-ia-latest.apk" \
            --file ./apk-output/fenix-ia-latest.apk \
            --content-type "application/vnd.android.package-archive" \
            --remote

      - name: Generar y subir version.json
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
        run: |
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          PUBLIC_URL="${{ secrets.CF_R2_PUBLIC_URL }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -3 | tr '\n' ' ')

          cat > version.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "${PUBLIC_URL}/fenix-ia-latest.apk",
            "notes": "${COMMIT_MSG}",
            "sha": "${SHORT_SHA}"
          }
          EOF

          cat version.json

          wrangler r2 object put "fenix-ia-releases/version.json" \
            --file version.json \
            --content-type "application/json" \
            --remote

      - name: Resumen
        run: |
          PUBLIC_URL="${{ secrets.CF_R2_PUBLIC_URL }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          echo "### ☁️ Release R2 publicado" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | \`$VERSION_CODE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${PUBLIC_URL}/fenix-ia-latest.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| version.json | \`${PUBLIC_URL}/version.json\` |" >> $GITHUB_STEP_SUMMARY
