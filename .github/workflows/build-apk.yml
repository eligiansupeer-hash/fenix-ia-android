name: CI — Verificación previa al rebuild

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# ESTRUCTURA:
#   Job 1 — compile     → compileDebugKotlin  (rápido, detecta errores de tipos)
#   Job 2 — unit-tests  → testDebugUnitTest   (solo si compile pasa)
#   Job 3 — build-apk   → assembleDebug       (solo si tests pasan)
#
# NOTA: el repo no tiene gradle-wrapper.jar (binario, no se puede commitear
# por API de texto). Por eso cada job instala Gradle 8.9 con
# gradle/actions/setup-gradle y llama `gradle` directo (sin ./gradlew).
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Compilación Kotlin
  # Detecta: errores de tipos, imports rotos, funciones no resueltas, etc.
  # ──────────────────────────────────────────────────────────────────────────
  compile:
    name: "🔨 Compilar Kotlin"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar (compileDebugKotlin)
        run: gradle compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee /tmp/compile.log

      - name: Verificar API keys hardcodeadas (seguridad AGENTS.md)
        if: success()
        run: |
          if grep -r --include="*.kt" \
            -E "AIza[A-Za-z0-9_-]{35}|sk-[A-Za-z0-9]{20,}|gsk_[A-Za-z0-9]{20,}" \
            app/src/main/; then
            echo "::error::⛔ API key en texto plano detectada en el código fuente"
            exit 1
          fi
          echo "✅ Sin API keys hardcodeadas"

      - name: Resumen — errores de compilación
        if: failure()
        run: |
          echo "### ❌ Errores de compilación Kotlin" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^e: |error:" /tmp/compile.log | head -60 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "> Los archivos marcados con \`e:\` tienen el número de línea exacto." >> $GITHUB_STEP_SUMMARY

      - name: Resumen — compilación OK
        if: success()
        run: |
          echo "### ✅ Compilación Kotlin exitosa" >> $GITHUB_STEP_SUMMARY
          echo "- Sin errores de tipo ni imports rotos" >> $GITHUB_STEP_SUMMARY
          echo "- Sin API keys hardcodeadas" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests unitarios JVM (JUnit5 + MockK, sin emulador)
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "🧪 Tests Unitarios (JVM)"
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Correr tests JVM (testDebugUnitTest)
        run: gradle testDebugUnitTest --no-daemon --continue
        # --continue: corre todos los tests aunque alguno falle,
        # así el reporte muestra todos los errores de una vez

      - name: Resumen de resultados
        if: always()
        run: |
          echo "### 🧪 Resultados de Tests Unitarios" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls app/build/test-results/testDebugUnitTest/*.xml 1>/dev/null 2>&1; then
            TOTAL=$(grep -h 'tests=' app/build/test-results/testDebugUnitTest/*.xml \
              | grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            FAILED=$(grep -h 'failures=' app/build/test-results/testDebugUnitTest/*.xml \
              | grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            ERRORS=$(grep -h 'errors=' app/build/test-results/testDebugUnitTest/*.xml \
              | grep -oP 'errors="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            SKIPPED=$(grep -h 'skipped=' app/build/test-results/testDebugUnitTest/*.xml \
              | grep -oP 'skipped="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            PASSED=$(( TOTAL - FAILED - ERRORS - SKIPPED ))
            echo "| ✅ Pasaron | ❌ Fallaron | 💥 Errores | ⏭️ Saltados |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|------------|-----------|------------|" >> $GITHUB_STEP_SUMMARY
            echo "| $PASSED | $FAILED | $ERRORS | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Tests fallidos:**" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -rh '<testcase' app/build/test-results/testDebugUnitTest/*.xml \
                | grep -E 'failure|error' \
                | grep -oP 'name="\K[^"]+' | head -20 >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No se generaron XMLs de resultados — puede ser un error de configuración." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Subir reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Build APK Debug completo
  # Solo corre si compilación + tests pasaron.
  # APK descargable desde la pestaña Artifacts de GitHub Actions.
  # ──────────────────────────────────────────────────────────────────────────
  build-apk:
    name: "📦 Build APK Debug"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK Debug (assembleDebug)
        run: gradle assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: "fenix-ia-debug-${{ github.sha }}"
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Resumen final
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          echo "### ✅ APK listo para instalar" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tamaño | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHORT\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Descargá el APK desde **Artifacts** e instalalo con:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo 'adb install -r app-debug.apk' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
