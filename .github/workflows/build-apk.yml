name: CI — Build, Test y Release OTA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# ESTRUCTURA:
#   Job 1 — bump-version  → incrementa versionCode en build.gradle.kts y commit
#   Job 2 — compile       → compileDebugKotlin
#   Job 3 — unit-tests    → testDebugUnitTest   (solo si compile pasa)
#   Job 4 — build-apk     → assembleDebug       (solo si tests pasan)
#   Job 5 — release       → Sube APK + version.json a Cloudflare R2 (OTA estable)
#
# DISTRIBUCIÓN OTA via Cloudflare R2:
#   - APK publicado en: https://pub-<HASH>.r2.dev/fenix-ia-latest.apk
#   - Metadata en:      https://pub-<HASH>.r2.dev/version.json
#   - URLs permanentes, sin TTL, sin tokens presignados → descarga estable.
#   - Secrets requeridos: CF_ACCOUNT_ID, CF_API_TOKEN, CF_R2_BUCKET_NAME,
#                         CF_R2_PUBLIC_URL (URL pública del bucket, sin trailing slash)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Auto-incremento de versionCode
  # ──────────────────────────────────────────────────────────────────────────
  bump-version:
    name: "🔢 Incrementar versionCode"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      version_code: ${{ steps.bump.outputs.version_code }}
      version_name: ${{ steps.bump.outputs.version_name }}

    steps:
      - name: Checkout (con historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Incrementar versionCode y versionName
        id: bump
        run: |
          FILE="app/build.gradle.kts"
          CURRENT=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$FILE" | head -1)
          if [ -z "$CURRENT" ]; then
            echo "::error::No se pudo leer versionCode de $FILE"
            exit 1
          fi
          NEW=$(( CURRENT + 1 ))
          NEW_NAME="1.0.${NEW}"
          echo "🔢 versionCode: $CURRENT → $NEW"
          sed -i "s/versionCode\s*=\s*${CURRENT}/versionCode = ${NEW}/" "$FILE"
          sed -i "s/versionName\s*=\s*\"[^\"]*\"/versionName = \"${NEW_NAME}\"/" "$FILE"
          grep "versionCode" "$FILE"
          grep "versionName" "$FILE"
          echo "version_code=$NEW" >> $GITHUB_OUTPUT
          echo "version_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Commit y push [skip ci]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump versionCode to ${{ steps.bump.outputs.version_code }} [skip ci]"
          git push

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Compilación Kotlin
  # ──────────────────────────────────────────────────────────────────────────
  compile:
    name: "🔨 Compilar Kotlin"
    runs-on: ubuntu-latest
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar (compileDebugKotlin)
        run: gradle compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee /tmp/compile.log

      - name: Verificar API keys hardcodeadas
        if: success()
        run: |
          if grep -r --include="*.kt" \
            -E "AIza[A-Za-z0-9_-]{35}|sk-[A-Za-z0-9]{20,}|gsk_[A-Za-z0-9]{20,}" \
            app/src/main/; then
            echo "::error::⛔ API key en texto plano detectada"
            exit 1
          fi
          echo "✅ Sin API keys hardcodeadas"

      - name: Resumen — errores de compilación
        if: failure()
        run: |
          echo "### ❌ Errores de compilación Kotlin" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^e: |error:" /tmp/compile.log | head -60 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Tests unitarios JVM
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "🧪 Tests Unitarios (JVM)"
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Correr tests JVM
        run: gradle testDebugUnitTest --no-daemon --continue

      - name: Resumen de resultados
        if: always()
        run: |
          echo "### 🧪 Resultados de Tests Unitarios" >> $GITHUB_STEP_SUMMARY
          if ls app/build/test-results/testDebugUnitTest/*.xml 1>/dev/null 2>&1; then
            TOTAL=$(grep -h 'tests=' app/build/test-results/testDebugUnitTest/*.xml \
              | grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            FAILED=$(grep -h 'failures=' app/build/test-results/testDebugUnitTest/*.xml \
              | grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            PASSED=$(( TOTAL - FAILED ))
            echo "| ✅ Pasaron | ❌ Fallaron |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|------------|" >> $GITHUB_STEP_SUMMARY
            echo "| $PASSED | $FAILED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Subir reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: Build APK Debug
  # ──────────────────────────────────────────────────────────────────────────
  build-apk:
    name: "📦 Build APK Debug"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK Debug
        run: gradle assembleDebug --no-daemon

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-for-release
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Backup APK (14 días)
        uses: actions/upload-artifact@v4
        with:
          name: "fenix-ia-debug-${{ github.sha }}"
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5: Publicar en Cloudflare R2 (OTA estable)
  #
  # Secrets requeridos en el repositorio:
  #   CF_ACCOUNT_ID   → ID de cuenta Cloudflare (Settings → Account ID)
  #   CF_API_TOKEN    → API token con permisos R2:Edit
  #   CF_R2_BUCKET    → nombre del bucket: fenix-ia-releases
  #   CF_R2_PUBLIC_URL → URL pública del bucket SIN trailing slash
  #                      Ej: https://pub-xxxxxxxxxxxxxxxx.r2.dev
  # ──────────────────────────────────────────────────────────────────────────
  release-r2:
    name: "☁️ Publicar en Cloudflare R2"
    runs-on: ubuntu-latest
    needs: [bump-version, build-apk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Leer versión desde build.gradle.kts
        id: version
        run: |
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "✅ versionCode=$VERSION_CODE versionName=$VERSION_NAME"

      - name: Descargar APK
        uses: actions/download-artifact@v4
        with:
          name: apk-for-release
          path: ./apk-output/

      - name: Renombrar APK con versión
        run: |
          mv ./apk-output/app-debug.apk \
             ./apk-output/fenix-ia-latest.apk

      - name: Instalar wrangler
        run: npm install -g wrangler@latest

      - name: Subir APK a R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
        run: |
          wrangler r2 object put \
            "${{ secrets.CF_R2_BUCKET }}/fenix-ia-latest.apk" \
            --file ./apk-output/fenix-ia-latest.apk \
            --content-type "application/vnd.android.package-archive"

      - name: Generar y subir version.json
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
        run: |
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          PUBLIC_URL="${{ secrets.CF_R2_PUBLIC_URL }}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -3 | tr '\n' ' ')
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          cat > version.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "${PUBLIC_URL}/fenix-ia-latest.apk",
            "notes": "${COMMIT_MSG}",
            "sha": "${SHORT_SHA}"
          }
          EOF

          echo "📋 version.json:"
          cat version.json

          wrangler r2 object put \
            "${{ secrets.CF_R2_BUCKET }}/version.json" \
            --file version.json \
            --content-type "application/json"

      - name: Resumen final
        run: |
          PUBLIC_URL="${{ secrets.CF_R2_PUBLIC_URL }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          echo "### ☁️ Release R2 publicado" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | \`$VERSION_CODE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${PUBLIC_URL}/fenix-ia-latest.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Metadata | \`${PUBLIC_URL}/version.json\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ URL estable sin TTL — descarga no se corta por token expirado." >> $GITHUB_STEP_SUMMARY
