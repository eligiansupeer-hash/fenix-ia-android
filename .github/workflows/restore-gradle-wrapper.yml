name: Restore Gradle Wrapper

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  restore-wrapper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if gradle-wrapper.jar is missing
        id: check_jar
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "jar_missing=true" >> $GITHUB_OUTPUT
            echo "::warning::gradle-wrapper.jar MISSING — will regenerate"
          else
            echo "jar_missing=false" >> $GITHUB_OUTPUT
            echo "gradle-wrapper.jar already present — skipping"
          fi

      - name: Set up Java 17
        if: steps.check_jar.outputs.jar_missing == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and install Gradle 8.9 binary
        if: steps.check_jar.outputs.jar_missing == 'true'
        run: |
          GRADLE_VERSION="8.9"
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -O /tmp/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q /tmp/gradle-${GRADLE_VERSION}-bin.zip -d /opt
          sudo ln -s /opt/gradle-${GRADLE_VERSION}/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Generate gradle-wrapper.jar for 8.9
        if: steps.check_jar.outputs.jar_missing == 'true'
        run: |
          gradle wrapper --gradle-version 8.9 --distribution-type bin
          chmod +x gradlew
          echo "--- generated files ---"
          ls -la gradle/wrapper/
          sha256sum gradle/wrapper/gradle-wrapper.jar

      - name: Commit and push restored wrapper
        if: steps.check_jar.outputs.jar_missing == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.jar gradlew
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "fix: restore gradle-wrapper.jar via workflow [skip ci]"
          git pull --rebase origin main
          git push origin main
