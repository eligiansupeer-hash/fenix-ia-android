name: Restore Gradle Wrapper

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  restore-wrapper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if gradle-wrapper.jar is missing
        id: check_jar
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "jar_missing=true" >> $GITHUB_OUTPUT
            echo "::warning::gradle-wrapper.jar MISSING — will regenerate"
          else
            echo "jar_missing=false" >> $GITHUB_OUTPUT
            echo "gradle-wrapper.jar already present — skipping"
          fi

      - name: Set up Java 17
        if: steps.check_jar.outputs.jar_missing == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9 (same action as build-apk.yml)
        if: steps.check_jar.outputs.jar_missing == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate gradle-wrapper.jar for 8.9
        if: steps.check_jar.outputs.jar_missing == 'true'
        run: |
          gradle wrapper --gradle-version 8.9 --distribution-type bin
          chmod +x gradlew
          echo "--- generated files ---"
          ls -la gradle/wrapper/
          sha256sum gradle/wrapper/gradle-wrapper.jar

      - name: Commit restored wrapper
        if: steps.check_jar.outputs.jar_missing == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.jar gradlew
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "fix: restore executable gradle-wrapper.jar [skip ci]"
          git push
